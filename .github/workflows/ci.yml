name: SyllabusAI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # 1) Checkout the code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2) Enable Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3) Build and Start Services via Docker Compose
      - name: Start services
        run: docker compose up -d --build
        env:
          MONGO_URI: mongodb://localhost:27017/test
          JWT_SECRET: ci-test-secret
          PORT: 5050
          FLASK_AI_URL: http://ai-service:8000

      # 4) Wait for Backend to be ready
      - name: Wait for services
        run: |
          echo "Waiting for backend on port 5055..."
          for i in {1..20}; do
            curl -s http://localhost:5055/health && break
            echo "Retrying..."
            sleep 5
          done
          curl -f http://localhost:5055/health

      # 5) Verify AI Service Health
      - name: Verify AI Service
        run: |
          echo "Testing AI Service via Host Port 8000"
          curl -f http://localhost:8000/health

      # 6) Debugging info
      - name: Docker status
        run: docker ps

      # 7) Always print logs if failure
      - name: Dump logs
        if: always()
        run: docker compose logs
