name: SyllabusAI CI

on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]

jobs:
build-and-test:
runs-on: ubuntu-latest

```
steps:
  # 1) Get your code
  - name: Checkout repo
    uses: actions/checkout@v4

  # 2) Enable Docker Buildx (faster/more reliable builds)
  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  # 3) Build Node backend image
  - name: Build backend image
    run: docker build -t syllabusai-backend ./backend

  # 4) Build Flask AI image
  - name: Build AI image
    run: docker build -t syllabusai-ai ./ai-backend

  # 5) Start both services via docker-compose (detached)
  - name: Start services
    run: docker compose up -d --build

  # 6) Wait for services to be ready (simple health checks)
  - name: Wait for services
    run: |
      echo "Waiting for services..."
      for i in {1..20}; do
        curl -s http://localhost:5001/health && break
        sleep 3
      done
      curl -f http://localhost:5001/health

  # 7) Smoke test: Node can reach Flask (via your API)
  - name: Smoke test (chat or health)
    run: |
      echo "Testing Node → Flask flow"
      curl -f http://localhost:5001/health

  # 8) Show running containers (debug)
  - name: Docker ps
    run: docker ps

  # 9) Always print logs (helps if something fails)
  - name: Dump logs
    if: always()
    run: docker compose logs --no-color
```
