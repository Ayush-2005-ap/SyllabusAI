name: SyllabusAI CI

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Create dummy .env files to satisfy Docker Compose
      - name: Create dummy .env files
        run: |
          touch backend/.env
          touch ai-backend/.env

      # 4. Start all services
      # We provide environment variables directly since .env files are usually ignored
      - name: Start services
        run: docker compose up -d --build
        env:
          MONGO_URI: mongodb://mongo:27017/syllabusai
          JWT_SECRET: ci-test-secret
          PORT: 5050
          FLASK_AI_URL: http://ai-service:8000
          NODE_BACKEND_SECRET: ci-secret-123

      # 4. Wait for backend and database to be ready
      - name: Wait for services
        run: |
          echo "Waiting for backend on localhost:5055..."
          for i in {1..30}
          do
            if curl -s http://localhost:5055/health; then
              echo "Backend is up and running!"
              exit 0
            fi
            echo "Still waiting (attempt $i)..."
            sleep 5
          done

          echo "Backend failed to start in time. Printing logs:"
          docker compose logs
          exit 1

      # 5. Verify AI Service Health
      - name: Test AI Service
        run: |
          echo "Checking AI service on localhost:8000..."
          curl -f http://localhost:8000/health

      # 6. Show containers status
      - name: Docker status
        run: docker ps

      # 7. Always print logs if failure
      - name: Dump logs on failure
        if: always()
        run: docker compose logs --no-color
