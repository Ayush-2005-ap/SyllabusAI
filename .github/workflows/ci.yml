name: SyllabusAI CI

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Start all services
      - name: Start services
        run: docker compose up -d --build

      # 4. Wait for backend
      - name: Wait for backend
        run: |
          echo "Waiting for backend..."
          for i in {1..30}
          do
            if curl -s http://localhost:5055/health; then
              echo "Backend is up!"
              exit 0
            fi
            echo "Retrying..."
            sleep 3
          done

          echo "Backend failed to start"
          docker compose logs
          exit 1

      # 5. Test AI service
      - name: Test AI Service
        run: |
          echo "Checking AI service..."
          curl -f http://localhost:8000/health

      # 6. Show containers
      - name: Docker status
        run: docker ps

      # 7. Always print logs
      - name: Dump logs
        if: always()
        run: docker compose logs --no-color
