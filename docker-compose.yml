version: "3.9"

services:

  mongo:
    image: mongo:6
    container_name: mongo-container
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: backend-container
    ports:
      - "5055:5050"
    env_file:
      - ./backend/.env
    volumes:
      - shared-uploads:/app/uploads
    depends_on:
      - ai-service

  ai-service:
    build: ./ai-backend
    container_name: ai-container
    ports:
      - "8000:8000"
    env_file:
      - ./ai-backend/.env
    volumes:
      - shared-uploads:/app/uploads

volumes:
  shared-uploads: